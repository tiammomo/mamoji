# Dependabot 配置
# 自动检测依赖漏洞并创建 PR

version: 2
updates:
  # Maven 依赖
  - package-ecosystem: maven
    directory: "/backend"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 10
    commit-message:
      prefix: "fix"
      include: "scope"
    labels:
      - "dependencies"
      - "security"
    reviewers:
      - maintainer
    versioning-strategy: increase

  # npm 依赖
  - package-ecosystem: npm
    directory: "/frontend"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 10
    commit-message:
      prefix: "fix"
      include: "scope"
    labels:
      - "dependencies"
      - "security"
    reviewers:
      - maintainer
    versioning-strategy: increase
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci"
    labels:
      - "ci"
      - "dependencies"
