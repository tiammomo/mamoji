# ============================================================
# Mamoji Docker Compose
# ============================================================
#
# 开发/测试环境: docker-compose -f docker-compose.yml up -d
# 生产环境: docker-compose -f docker-compose.prod.yml up -d
# 查看日志: docker-compose logs -f
# 停止服务: docker-compose down
#
# 重要: 生产环境必须设置以下环境变量，禁止使用默认值
# cp docker-compose.env.example .env 然后编辑 .env 文件
#
# ============================================================

services:
  # ============================================================
  # MySQL 数据库
  # ============================================================
  mysql:
    image: 5ykpmdvdg6to97.xuanyuan.run/mysql:8.0
    container_name: mamoji-mysql
    restart: unless-stopped  # 生产环境使用 unless-stopped，开发环境可移除
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-mamoji}
      MYSQL_USER: ${DB_USER:-mamoji_mysql}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - mamoji-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --max-connections=200
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # ============================================================
  # Redis 缓存
  # ============================================================
  redis:
    image: 5ykpmdvdg6to97.xuanyuan.run/redis:7-alpine
    container_name: mamoji-redis
    restart: unless-stopped
    env_file:
      - .env
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - mamoji-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-mamoji_redis_pass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # ============================================================
  # 后端服务
  # ============================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mamoji-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Profile 配置
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-dev}

      # 数据库配置（使用服务名连接 Docker 网络）
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-mamoji}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=${DB_USER:-mamoji_mysql}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - SPRING_JPA_DATABASE_PLATFORM=org.hibernate.dialect.MySQLDialect

      # 服务端口
      - SERVER_PORT=38080

      # JWT 配置（生产环境必须修改！）
      - JWT_SECRET=${JWT_SECRET}

      # Redis 配置（使用服务名连接）
      - REDIS_ENABLED=true
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PASSWORD=${REDIS_PASSWORD:-mamoji_redis_pass}

      # AI 服务（可选）
      - ANTHROPIC_AUTH_TOKEN=${ANTHROPIC_AUTH_TOKEN:-}

      # JVM 优化参数
      - JAVA_OPTS=-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -XX:+UseG1GC
    ports:
      - "${BACKEND_PORT:-38080}:38080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mamoji-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:38080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================
  # 前端服务
  # ============================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mamoji-frontend
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_BASE=http://backend:38080/api/v1
      - NODE_ENV=production
    ports:
      - "${FRONTEND_PORT:-33000}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - mamoji-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ============================================================
# 卷轴配置
# ============================================================
volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

# ============================================================
# 网络配置
# ============================================================
networks:
  mamoji-network:
    driver: bridge
    name: mamoji-network
